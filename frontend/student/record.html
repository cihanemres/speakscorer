<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0e1a">
    <title>SpeakScorer — Konuşma Pratiği</title>
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <style>
        /* ═══════════════════════════════════════════════════════════
           PRATİK / KAYIT EKRANI  ·  Kılavuz görseli #1 ile birebir
           Mor → Magenta → Cyan neon palet (kılavuzdaki mikrofon & gauge)
           ═══════════════════════════════════════════════════════════ */
        :root {
            --p-purple: #a855f7;
            --p-magenta: #d946ef;
            --p-cyan: #22d3ee;
            --p-grad: linear-gradient(135deg, #a855f7 0%, #d946ef 50%, #22d3ee 100%);
        }
        .practice-shell {
            max-width: 1320px; margin: 0 auto;
            padding: clamp(0.75rem, 2vw, 1.5rem) clamp(0.75rem, 2.5vw, 1.75rem)
                     calc(var(--space-2xl) + env(safe-area-inset-bottom, 0px));
        }

        /* ── Üst bar ───────────────────────────────────────── */
        .practice-topbar {
            display: flex; align-items: center; gap: var(--space-lg);
            padding: 0.7rem 1.1rem; margin-bottom: var(--space-lg);
            background: var(--glass-strong);
            backdrop-filter: blur(22px) saturate(150%); -webkit-backdrop-filter: blur(22px) saturate(150%);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }
        .pt-brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-display); font-weight: 800; letter-spacing: -0.02em; font-size: 1.05rem; white-space: nowrap; }
        .pt-logo { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 10px; background: var(--p-grad); box-shadow: 0 0 18px rgba(168,85,247,0.5); font-size: 1rem; }
        .pt-ai { background: var(--p-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .pt-nav { display: flex; align-items: center; gap: 4px; margin-left: var(--space-md); }
        .pt-link {
            display: inline-flex; align-items: center; gap: 7px; padding: 0.5rem 0.95rem;
            border-radius: var(--radius-full); font-size: var(--font-sm); font-weight: 600;
            color: var(--text-2); white-space: nowrap; transition: background 0.2s, color 0.2s;
        }
        .pt-link:hover { background: var(--surface-1); color: var(--text-1); }
        .pt-link.active { color: var(--text-1); position: relative; }
        .pt-link.active::after { content: ''; position: absolute; left: 0.95rem; right: 0.95rem; bottom: 2px; height: 2px; border-radius: 2px; background: var(--p-grad); }
        .pt-spacer { flex: 1; }
        .pt-user { display: inline-flex; align-items: center; gap: 9px; font-weight: 700; font-size: var(--font-sm); color: var(--text-1); white-space: nowrap; }
        .pt-user .ava { width: 30px; height: 30px; border-radius: 50%; background: var(--p-grad); display: grid; place-items: center; font-size: 0.8rem; color: #fff; box-shadow: 0 0 14px rgba(168,85,247,0.4); }
        @media (max-width: 760px) { .pt-nav { display: none; } }

        /* ── Ana yerleşim: 3 kolon ─────────────────────────── */
        .practice-grid {
            display: grid;
            grid-template-columns: 190px minmax(0, 1fr) 240px;
            gap: clamp(0.9rem, 2vw, 1.5rem);
            align-items: start;
        }
        @media (max-width: 1080px) {
            .practice-grid { grid-template-columns: 1fr; }
            .soundscape { display: none !important; }
            .feedback-rail .gauge-stack { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 560px) {
            .feedback-rail .gauge-stack { grid-template-columns: repeat(2, 1fr); }
        }

        /* ── Sol: gerçek zamanlı geri bildirim gauge'ları ─── */
        .feedback-rail .rail-title { font-size: var(--font-sm); font-weight: 700; color: var(--text-2); margin-bottom: var(--space-md); letter-spacing: 0.01em; }
        .gauge-stack { display: grid; grid-template-columns: 1fr; gap: var(--space-md); }
        .gauge {
            position: relative; padding: var(--space-md) var(--space-sm); text-align: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
            border: 1px solid var(--border); border-radius: var(--radius-lg);
        }
        .gauge-ring { position: relative; width: 104px; max-width: 70%; margin: 0 auto; aspect-ratio: 1; }
        .gauge-svg { width: 100%; height: 100%; display: block; }
        .gauge-track, .gauge-arc { fill: none; stroke-width: 8; stroke-linecap: round; }
        .gauge-track { stroke: rgba(255,255,255,0.08); stroke-dasharray: 188.5 251.4; }
        .gauge-arc {
            stroke-dasharray: 0 251.4;
            transition: stroke-dasharray 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            filter: drop-shadow(0 0 5px rgba(168,85,247,0.55));
        }
        .gauge-center { position: absolute; inset: 0; display: grid; place-content: center; line-height: 1; }
        .gauge-num { font-family: var(--font-display); font-weight: 800; font-size: 1.45rem; color: var(--text-1); }
        .gauge-den { font-size: 0.62rem; color: var(--text-3); font-weight: 700; }
        .gauge-label { margin-top: 8px; font-size: var(--font-sm); font-weight: 600; color: var(--text-2); }

        /* ── Orta: sahne kartı ─────────────────────────────── */
        .stage-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)), var(--glass-strong);
            backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid var(--border); border-radius: var(--radius-xl);
            padding: clamp(1.1rem, 2.6vw, 1.9rem);
            box-shadow: var(--shadow-md), 0 0 30px rgba(168,85,247,0.07);
            animation: rise 0.55s ease both;
        }
        .stage-head { display: flex; align-items: center; gap: var(--space-md); margin-bottom: var(--space-md); }
        .stage-ava { width: 52px; height: 52px; flex-shrink: 0; border-radius: 50%; display: grid; place-items: center; font-weight: 800; color: #fff; font-size: 1.2rem; background: var(--p-grad); box-shadow: 0 0 16px rgba(168,85,247,0.5); border: 2px solid rgba(255,255,255,0.12); }
        .stage-name { font-family: var(--font-head); font-weight: 800; font-size: var(--font-lg); color: var(--text-1); }
        .stage-meta { font-size: var(--font-xs); font-weight: 700; letter-spacing: 0.6px; color: var(--text-3); text-transform: uppercase; }
        .stage-head .badge { margin-left: auto; }
        .stage-card h2 { font-size: var(--font-lg); margin-bottom: var(--space-sm); }
        .paragraph-text {
            font-size: var(--font-md); line-height: 1.8; color: var(--text-2);
            padding: var(--space-md) var(--space-lg);
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: var(--radius-md); max-height: 168px; overflow-y: auto;
        }
        .tts-row { margin-top: var(--space-md); }

        /* ── Mikrofon ──────────────────────────────────────── */
        .mic-wrap { display: flex; flex-direction: column; align-items: center; gap: var(--space-md); margin: var(--space-xl) 0 var(--space-md); }
        .mic-btn {
            position: relative; width: 150px; height: 150px; border-radius: 50%; cursor: pointer;
            border: none; padding: 0; -webkit-tap-highlight-color: transparent;
            background:
                radial-gradient(circle at 50% 50%, rgba(10,8,22,0.96) 0 44%, transparent 46%),
                conic-gradient(from 180deg, #22d3ee, #a855f7, #d946ef, #22d3ee);
            box-shadow: 0 0 0 6px rgba(168,85,247,0.10), 0 0 38px rgba(168,85,247,0.45), 0 0 60px rgba(34,211,238,0.25);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.25s;
            animation: micRotate 7s linear infinite;
        }
        .mic-btn::before { /* iç koyu disk */
            content: ''; position: absolute; inset: 12px; border-radius: 50%;
            background: radial-gradient(circle at 50% 35%, #1a1430, #0a0816 75%);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.7);
        }
        .mic-btn:hover { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(217,70,239,0.12), 0 0 48px rgba(217,70,239,0.55), 0 0 70px rgba(34,211,238,0.3); }
        .mic-btn:active { transform: scale(0.96); }
        .mic-btn:focus-visible { outline: 3px solid #fff; outline-offset: 5px; }
        .mic-inner { position: absolute; inset: 12px; border-radius: 50%; display: grid; place-items: center; z-index: 2; animation: micRotateCounter 7s linear infinite; }
        .mic-waves { display: flex; align-items: center; justify-content: center; gap: 3px; height: 46px; position: absolute; }
        .mic-ico { position: relative; font-size: 2rem; filter: drop-shadow(0 0 10px rgba(217,70,239,0.7)); z-index: 1; }
        .mic-btn.recording { animation-play-state: paused; box-shadow: 0 0 0 8px rgba(239,68,68,0.14), 0 0 46px rgba(239,68,68,0.55); }
        .mic-btn.recording::before { background: radial-gradient(circle at 50% 35%, #3a1018, #1a0608 75%); }
        .mic-status { font-size: var(--font-sm); color: var(--text-2); text-align: center; }
        .mic-status strong { font-family: var(--font-head); font-weight: 800; letter-spacing: 0.5px; color: var(--text-1); }
        .mic-status strong.live { background: var(--p-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        .waveform-bar { width: 3px; border-radius: 99px; background: linear-gradient(180deg, #22d3ee, #d946ef); }

        .playback-area { display: flex; align-items: center; gap: var(--space-md); padding: var(--space-md); background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: var(--radius-md); margin-top: var(--space-md); }
        .playback-area audio { flex: 1; min-width: 0; }
        .submit-row { margin-top: var(--space-md); display: flex; flex-wrap: wrap; gap: var(--space-md); justify-content: center; }

        /* ── Sağ: dinleme görseli (soundscape) ─────────────── */
        .soundscape {
            position: relative; height: 100%; min-height: 360px;
            border-radius: var(--radius-xl); overflow: hidden;
            background: radial-gradient(120% 90% at 70% 20%, rgba(168,85,247,0.22), transparent 60%),
                        radial-gradient(120% 90% at 30% 90%, rgba(34,211,238,0.18), transparent 60%),
                        var(--glass-strong);
            border: 1px solid var(--border); box-shadow: var(--shadow-md);
            display: grid; place-items: center;
        }
        .ss-core { position: absolute; width: 110px; height: 110px; border-radius: 50%; background: var(--p-grad); filter: blur(2px); opacity: 0.9; box-shadow: 0 0 50px rgba(217,70,239,0.6); animation: corePulse 3.5s ease-in-out infinite; }
        .ss-ring { position: absolute; border-radius: 50%; border: 1.5px solid rgba(168,85,247,0.4); animation: ringPulse 3.5s ease-out infinite; }
        .ss-ring.r1 { width: 150px; height: 150px; animation-delay: 0s; }
        .ss-ring.r2 { width: 220px; height: 220px; animation-delay: 0.7s; border-color: rgba(217,70,239,0.32); }
        .ss-ring.r3 { width: 300px; height: 300px; animation-delay: 1.4s; border-color: rgba(34,211,238,0.28); }
        .ss-eq { position: absolute; bottom: 26px; display: flex; align-items: flex-end; gap: 5px; height: 56px; }
        .ss-eq span { width: 5px; border-radius: 99px; background: linear-gradient(180deg, #22d3ee, #d946ef); animation: eqBar 1.1s ease-in-out infinite; }
        .ss-eq span:nth-child(1){animation-delay:.0s} .ss-eq span:nth-child(2){animation-delay:.15s}
        .ss-eq span:nth-child(3){animation-delay:.3s} .ss-eq span:nth-child(4){animation-delay:.45s}
        .ss-eq span:nth-child(5){animation-delay:.2s} .ss-eq span:nth-child(6){animation-delay:.5s}
        .ss-eq span:nth-child(7){animation-delay:.1s} .ss-eq span:nth-child(8){animation-delay:.35s}

        /* ── Alt kontrol çubuğu ────────────────────────────── */
        .control-bar {
            display: flex; align-items: center; gap: clamp(0.75rem, 2vw, 1.5rem);
            margin-top: var(--space-lg); padding: 0.85rem 1.25rem;
            background: var(--glass-strong);
            backdrop-filter: blur(22px) saturate(150%); -webkit-backdrop-filter: blur(22px) saturate(150%);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md); flex-wrap: wrap;
        }
        .cb-item { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .cb-label { font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-3); }
        .cb-val { font-family: var(--font-display); font-weight: 800; font-size: 1.3rem; color: var(--text-1); font-variant-numeric: tabular-nums; }
        .cb-sep { width: 1px; height: 34px; background: var(--border); }
        .cb-progress { flex: 1; min-width: 130px; display: flex; flex-direction: column; gap: 6px; }
        .cb-bar { height: 8px; border-radius: 99px; background: var(--surface-2); overflow: hidden; }
        .cb-bar > div { height: 100%; width: 0; border-radius: 99px; background: var(--p-grad); box-shadow: 0 0 12px rgba(217,70,239,0.6); transition: width 0.4s ease; }
        .cb-stop {
            display: inline-flex; align-items: center; gap: 9px; padding: 0.7rem 1.5rem; min-height: 48px;
            border-radius: var(--radius-full); border: 1px solid rgba(168,85,247,0.4);
            background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(34,211,238,0.18));
            color: var(--text-1); font-family: var(--font-body); font-weight: 800; font-size: var(--font-sm);
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .cb-stop:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(168,85,247,0.35); }
        .cb-stop .dot { width: 11px; height: 11px; border-radius: 3px; background: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.6); }
        .cb-stop.idle .dot { border-radius: 50%; background: #f43f5e; box-shadow: 0 0 10px rgba(244,63,94,0.8); }
        .cb-stop:disabled { opacity: 0.45; cursor: not-allowed; }
        .cb-help { width: 44px; height: 44px; flex-shrink: 0; border-radius: 50%; display: grid; place-items: center; border: 1px solid var(--border); color: var(--text-2); font-weight: 800; background: var(--surface-1); }
        .cb-help:hover { color: var(--text-1); border-color: var(--border-strong); }

        /* ── Sonuç (gönderim sonrası) ──────────────────────── */
        .result-feedback { margin-top: var(--space-lg); }
        .rf-block { margin-top: var(--space-md); }
        .rf-block h4 { margin-bottom: var(--space-sm); font-size: var(--font-md); }
        .rf-text { font-size: var(--font-sm); line-height: 1.7; padding: var(--space-md); background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: var(--radius-md); }
        .rf-final { display: flex; align-items: center; gap: var(--space-lg); flex-wrap: wrap; }
        .rf-final .big { font-family: var(--font-display); font-weight: 800; font-size: 2.6rem; background: var(--p-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }

        /* ── Animasyonlar ──────────────────────────────────── */
        @keyframes micRotate { to { transform: rotate(360deg); } }
        @keyframes micRotateCounter { to { transform: rotate(-360deg); } }
        @keyframes corePulse { 0%,100% { transform: scale(0.92); opacity: 0.8; } 50% { transform: scale(1.08); opacity: 1; } }
        @keyframes ringPulse { 0% { transform: scale(0.6); opacity: 0.9; } 100% { transform: scale(1.25); opacity: 0; } }
        @keyframes eqBar { 0%,100% { height: 12px; } 50% { height: 52px; } }
        @media (prefers-reduced-motion: reduce) {
            .mic-btn, .mic-inner, .ss-core, .ss-ring, .ss-eq span { animation: none !important; }
        }
    </style>
</head>
<body>
    <div class="practice-shell">
        <header class="practice-topbar">
            <div class="pt-brand"><span class="pt-logo" aria-hidden="true">🎙️</span> SPEAK<span class="pt-ai">AI</span></div>
            <nav class="pt-nav" aria-label="Pratik gezinme">
                <a href="/app/dashboard.html" class="pt-link">▢ Panel</a>
                <span class="pt-link active">🎤 Pratik</span>
                <a href="/app/dashboard.html" class="pt-link">🕘 Geçmiş</a>
            </nav>
            <div class="pt-spacer"></div>
            <div class="pt-user"><span class="ava" id="pt-ava" aria-hidden="true">?</span> <span id="pt-name">Öğrenci</span></div>
        </header>

        <a href="/app/dashboard.html" class="back-link" style="display:inline-flex;align-items:center;gap:8px;margin-bottom:var(--space-md);color:var(--text-2);font-weight:600;min-height:44px">← Panele Dön</a>

        <div id="loading-state" class="flex-center" style="height:50vh"><div class="spinner" role="status" aria-label="Yükleniyor"></div></div>

        <div id="content" class="hidden">
            <div class="practice-grid">
                <!-- SOL: gerçek zamanlı geri bildirim -->
                <aside class="feedback-rail">
                    <div class="rail-title">Gerçek zamanlı geri bildirim</div>
                    <div class="gauge-stack" id="gauges"></div>
                </aside>

                <!-- ORTA: sahne -->
                <section class="stage">
                    <div class="stage-card" id="stage-card">
                        <div class="stage-head">
                            <div class="stage-ava" id="stage-ava" aria-hidden="true">?</div>
                            <div>
                                <div class="stage-name" id="stage-name">Öğrenci</div>
                                <div class="stage-meta" id="para-meta">Aktif kullanıcı</div>
                            </div>
                            <span class="badge badge-primary" id="para-level"></span>
                        </div>

                        <h2 id="para-title"></h2>
                        <div class="paragraph-text" id="para-text"></div>
                        <div class="tts-row">
                            <button class="btn btn-secondary" onclick="readAloud()" id="tts-btn">🔊 Metni Dinle</button>
                        </div>

                        <div id="record-section">
                            <div class="mic-wrap">
                                <button class="mic-btn" id="record-btn" onclick="toggleRecording()" aria-label="Kaydı başlat veya durdur">
                                    <span class="mic-inner">
                                        <span class="mic-waves" id="waveform" aria-hidden="true"></span>
                                        <span class="mic-ico" aria-hidden="true">🎤</span>
                                    </span>
                                </button>
                                <div class="mic-status"><strong id="record-status">KAYDA HAZIR</strong> <span aria-hidden="true">•</span> <span id="record-hint">Başlamak için mikrofona dokun</span></div>
                            </div>

                            <div id="playback-area" class="playback-area hidden">
                                <span aria-hidden="true">🎵</span>
                                <audio id="playback" controls></audio>
                            </div>

                            <div class="submit-row hidden" id="submit-area">
                                <button class="btn btn-primary btn-lg" onclick="submitRecording()" id="submit-btn">📤 AI Değerlendirmesine Gönder</button>
                                <button class="btn btn-secondary btn-lg" onclick="resetRecording()">🔄 Tekrar Kaydet</button>
                            </div>
                        </div>

                        <!-- Sonuç bölümü (gönderim sonrası) -->
                        <div id="result-section" class="hidden result-feedback">
                            <hr style="border:none;border-top:1px solid var(--border);margin:var(--space-lg) 0">
                            <div class="rf-final">
                                <div>
                                    <div class="text-xs text-muted" style="text-transform:uppercase;letter-spacing:1px;font-weight:700">Nihai Puan</div>
                                    <div class="big"><span id="result-final">0</span><span class="text-sm text-muted" style="-webkit-text-fill-color:var(--text-3)">/100</span></div>
                                </div>
                                <div style="flex:1;min-width:180px"><p class="text-secondary" id="result-status"></p></div>
                            </div>
                            <div class="rf-block">
                                <h4>📝 Transkript</h4>
                                <p class="rf-text text-secondary" id="result-transcript"></p>
                            </div>
                            <div class="rf-block">
                                <h4>🤖 AI Geri Bildirimi</h4>
                                <p class="rf-text" style="color:#c4b5fd" id="result-feedback"></p>
                            </div>
                            <div style="margin-top:var(--space-lg);text-align:center">
                                <a href="/app/dashboard.html" class="btn btn-primary btn-lg">Panele Dön</a>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- SAĞ: dinleme görseli -->
                <aside class="soundscape" aria-hidden="true">
                    <div class="ss-ring r3"></div>
                    <div class="ss-ring r2"></div>
                    <div class="ss-ring r1"></div>
                    <div class="ss-core"></div>
                    <div class="ss-eq"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
                </aside>
            </div>

            <!-- ALT KONTROL ÇUBUĞU -->
            <footer class="control-bar">
                <div class="cb-item"><span class="cb-label">Kayıt Süresi</span><span class="cb-val" id="record-timer">0:00</span></div>
                <div class="cb-sep" aria-hidden="true"></div>
                <div class="cb-item"><span class="cb-label">Kelime</span><span class="cb-val" id="word-count">0</span></div>
                <div class="cb-sep" aria-hidden="true"></div>
                <div class="cb-progress">
                    <span class="cb-label">İlerleme</span>
                    <div class="cb-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="cb-bar"><div id="cb-bar-fill"></div></div>
                </div>
                <button class="cb-stop idle" id="cb-stop" onclick="toggleRecording()"><span class="dot" aria-hidden="true"></span> <span id="cb-stop-label">Kaydet</span></button>
                <a class="cb-help" href="/app/dashboard.html" title="Panele dön" aria-label="Yardım / Panele dön">?</a>
            </footer>
        </div>
    </div>

    <script src="/static/js/app.js?v=4"></script>
    <script src="/static/js/recorder.js?v=4"></script>
    <script>
        if (!Auth.requireAuth()) window.location.href = '/';
        const user = Auth.getUser();
        const recorder = new AudioRecorder();
        let assignmentId = parseInt(new URLSearchParams(window.location.search).get('id'));
        let progressTimer = null;

        // Üst bar + sahne kartı kullanıcı bilgisi
        const initial = (user.ad_soyad || '?')[0].toUpperCase();
        document.getElementById('pt-ava').textContent = initial;
        document.getElementById('pt-name').textContent = user.ad_soyad || 'Öğrenci';
        document.getElementById('stage-ava').textContent = initial;
        document.getElementById('stage-name').textContent = user.ad_soyad || 'Öğrenci';

        // ── Gauge'lar (Kelime / Dilbilgisi / Akıcılık / Bütünlük, /10) ──
        const GAUGE_DEFS = [
            { key: 'vocabulary', label: 'Kelime' },
            { key: 'grammar', label: 'Dilbilgisi' },
            { key: 'fluency', label: 'Akıcılık' },
            { key: 'coherence', label: 'Bütünlük' },
        ];
        const GAUGE_CIRC = 251.4;          // 2πr, r=40
        const GAUGE_ARC_MAX = 188.5;       // görünür yay = %75 (270°)

        function renderGauges() {
            document.getElementById('gauges').innerHTML = GAUGE_DEFS.map((g, i) => `
                <div class="gauge" data-key="${g.key}">
                    <div class="gauge-ring">
                        <svg class="gauge-svg" viewBox="0 0 100 100">
                            <defs>
                                <linearGradient id="gg${i}" x1="0%" y1="100%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#a855f7"/>
                                    <stop offset="55%" stop-color="#d946ef"/>
                                    <stop offset="100%" stop-color="#22d3ee"/>
                                </linearGradient>
                            </defs>
                            <circle class="gauge-track" cx="50" cy="50" r="40" transform="rotate(135 50 50)"/>
                            <circle class="gauge-arc" cx="50" cy="50" r="40" transform="rotate(135 50 50)" stroke="url(#gg${i})"/>
                        </svg>
                        <div class="gauge-center"><span class="gauge-num" id="gnum-${g.key}">—</span><span class="gauge-den">/10</span></div>
                    </div>
                    <div class="gauge-label">${g.label}</div>
                </div>
            `).join('');
        }

        // score25: 0-25 → /10 değerine çevir + yayı ve sayıyı animasyonla doldur.
        function fillGauge(key, score25) {
            const v10 = Math.max(0, Math.min(10, (Number(score25) || 0) * 0.4));
            const gauge = document.querySelector(`.gauge[data-key="${key}"]`);
            if (!gauge) return;
            const arc = gauge.querySelector('.gauge-arc');
            const num = document.getElementById('gnum-' + key);
            // yay
            const len = GAUGE_ARC_MAX * (v10 / 10);
            requestAnimationFrame(() => { arc.style.strokeDasharray = `${len.toFixed(1)} ${GAUGE_CIRC}`; });
            // sayı (1 ondalık)
            if (prefersReduced()) { num.textContent = v10.toFixed(1); return; }
            const dur = 1100, start = performance.now();
            (function step(t) {
                const p = Math.min(1, (t - start) / dur);
                const eased = 1 - Math.pow(1 - p, 3);
                num.textContent = (v10 * eased).toFixed(1);
                if (p < 1) requestAnimationFrame(step);
            })(performance.now());
        }

        if (!assignmentId) {
            document.getElementById('loading-state').innerHTML = '<div class="alert alert-error"><span>✕</span><span>Ödev seçilmedi</span></div>';
        } else { loadTask(); }

        async function loadTask() {
            try {
                const data = await apiGet(`/api/student/tasks/${assignmentId}`);
                const para = data.paragraph;
                document.getElementById('para-title').textContent = para.title;
                document.getElementById('para-level').textContent = 'Seviye ' + para.level;
                document.getElementById('para-meta').textContent = `Aktif kullanıcı · Seviye ${para.level}`;
                document.getElementById('para-text').textContent = para.text;

                // Kelime sayısı
                const words = (para.text || '').trim().split(/\s+/).filter(Boolean).length;
                document.getElementById('word-count').textContent = words;

                renderGauges();

                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');

                // dalga-form çubukları (mikrofon içi)
                const wf = document.getElementById('waveform');
                for (let i = 0; i < 13; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'waveform-bar';
                    bar.style.height = '8px';
                    bar.style.opacity = '0.5';
                    bar.style.animationDelay = `${i * 0.05}s`;
                    wf.appendChild(bar);
                }

                if (data.submitted) {
                    document.getElementById('record-section').innerHTML = '<div class="alert alert-warning" style="margin-top:var(--space-lg)"><span>⚠</span><span>Bu ödev için zaten gönderim yapılmış.</span></div><div style="text-align:center"><a href="/app/dashboard.html" class="btn btn-primary">Panele Dön</a></div>';
                    document.getElementById('cb-stop').disabled = true;
                }
            } catch (err) {
                document.getElementById('loading-state').classList.remove('hidden');
                document.getElementById('loading-state').innerHTML = `<div class="alert alert-error"><span>✕</span><span>${esc(err.message)}</span></div>`;
            }
        }

        function readAloud() {
            const text = document.getElementById('para-text').textContent;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.85;
            speechSynthesis.speak(u);
            const btn = document.getElementById('tts-btn');
            btn.textContent = '🔊 Okunuyor...';
            u.onend = () => { btn.textContent = '🔊 Tekrar Dinle'; };
        }

        function setRecordingUI(on) {
            const micBtn = document.getElementById('record-btn');
            const status = document.getElementById('record-status');
            const hint = document.getElementById('record-hint');
            const stop = document.getElementById('cb-stop');
            const stopLabel = document.getElementById('cb-stop-label');
            const bars = document.querySelectorAll('.waveform-bar');
            if (on) {
                micBtn.classList.add('recording');
                status.textContent = 'DİNLENİYOR...';
                status.classList.add('live');
                hint.textContent = 'Net konuş';
                stop.classList.remove('idle');
                stopLabel.textContent = 'Durdur';
                bars.forEach(b => { b.style.opacity = '1'; b.style.animation = 'wave 0.9s ease-in-out infinite'; });
            } else {
                micBtn.classList.remove('recording');
                status.textContent = 'KAYIT TAMAM';
                status.classList.remove('live');
                hint.textContent = 'Kontrol et ve gönder';
                stop.classList.add('idle');
                stopLabel.textContent = 'Kaydet';
                bars.forEach(b => { b.style.animation = 'none'; b.style.height = '8px'; b.style.opacity = '0.5'; });
            }
        }

        function startProgress() {
            const fill = document.getElementById('cb-bar-fill');
            const bar = document.getElementById('cb-bar');
            const CAP = 90; // 90 sn'de %100 (görsel ilerleme)
            progressTimer = setInterval(() => {
                const el = recorder.startTime ? (Date.now() - recorder.startTime) / 1000 : 0;
                const pct = Math.min(100, (el / CAP) * 100);
                fill.style.width = pct + '%';
                bar.setAttribute('aria-valuenow', Math.round(pct));
            }, 250);
        }
        function stopProgress() { if (progressTimer) { clearInterval(progressTimer); progressTimer = null; } }

        async function toggleRecording() {
            if (document.getElementById('cb-stop').disabled) return;
            if (!recorder.isRecording) {
                try {
                    await recorder.start();
                    setRecordingUI(true);
                    startProgress();
                } catch (err) { showAlert(err.message, 'error'); }
            } else {
                const blob = await recorder.stop();
                stopProgress();
                setRecordingUI(false);
                if (blob) {
                    document.getElementById('playback').src = recorder.getUrl();
                    document.getElementById('playback-area').classList.remove('hidden');
                    document.getElementById('submit-area').classList.remove('hidden');
                }
            }
        }

        function resetRecording() {
            recorder.destroy();
            stopProgress();
            document.getElementById('playback-area').classList.add('hidden');
            document.getElementById('submit-area').classList.add('hidden');
            document.getElementById('record-timer').textContent = '0:00';
            document.getElementById('cb-bar-fill').style.width = '0%';
            document.getElementById('record-status').textContent = 'KAYDA HAZIR';
            document.getElementById('record-status').classList.remove('live');
            document.getElementById('record-hint').textContent = 'Başlamak için mikrofona dokun';
        }

        async function submitRecording() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.textContent = '⏳ AI analiz ediyor...';
            try {
                const file = recorder.getFile('kayit.webm');
                const fd = new FormData();
                fd.append('assignment_id', assignmentId);
                fd.append('audio', file);
                const result = await apiUpload('/api/student/submit', fd);
                if (result.error) { showAlert(result.message, 'warning'); btn.disabled = false; btn.textContent = '📤 AI Değerlendirmesine Gönder'; return; }
                showResults(result);
            } catch (err) { showAlert(err.message, 'error'); btn.disabled = false; btn.textContent = '📤 AI Değerlendirmesine Gönder'; }
        }

        function showResults(r) {
            const s = Math.round(r.final_score || r.ai_score || 0);

            // Sol gauge'ları AI puanlarıyla doldur (0-25 → /10)
            fillGauge('vocabulary', r.vocabulary || 0);
            fillGauge('grammar', r.grammar || 0);
            fillGauge('fluency', r.fluency || 0);
            fillGauge('coherence', r.coherence || 0);

            // Mikrofon/kayıt alanını gizle, sonucu göster
            document.querySelector('.mic-wrap').classList.add('hidden');
            document.getElementById('playback-area').classList.add('hidden');
            document.getElementById('submit-area').classList.add('hidden');
            document.getElementById('record-status').textContent = 'DEĞERLENDİRİLDİ';

            const res = document.getElementById('result-section');
            res.classList.remove('hidden');
            document.getElementById('result-status').textContent = s >= 80 ? 'Mükemmel iş! 🌟' : s >= 60 ? 'İyi gidiyorsun! 💪' : s >= 40 ? 'Gelişiyorsun! 📚' : 'Pratik yapmaya devam! 🎯';
            document.getElementById('result-transcript').textContent = r.transcript || 'Transkript yok';
            document.getElementById('result-feedback').textContent = r.feedback || 'Geri bildirim yok';

            // nihai puan say-up
            countUp(document.getElementById('result-final'), s);

            document.getElementById('cb-stop').disabled = true;
            if (s >= 80) setTimeout(launchConfetti, 500);
            res.scrollIntoView({ behavior: prefersReduced() ? 'auto' : 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
